{% extends "base.html" %}

{% block title %}
Login
{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <div class="card shadow-lg border-0 rounded-3">
                <div class="card-header bg-primary text-white text-center py-4">
                    <h2 class="mb-0 fw-bold">ARRMIS Login</h2>
                    <small class="text-white-50">Academic Records & Results Management</small>
                </div>
                <div class="card-body p-4">
                    <form method="POST" action="">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Username</label>
                            <input type="text" name="username" class="form-control form-control-lg" required placeholder="Enter Username">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Password</label>
                            <input type="password" name="password" class="form-control form-control-lg" required placeholder="Enter Password">
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100 mb-3 shadow-sm">Login</button>
                        <div class="text-center">
                            <a href="#" class="text-decoration-none small text-secondary">Forgot Password?</a>
                        </div>
                    </form>
                </div>
                <div class="card-footer bg-light text-center py-3 border-top">
                    <p class="small text-muted mb-0">Don't have an account? <a href="/register" class="text-decoration-none fw-bold text-primary">Sign Up</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
