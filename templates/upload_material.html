{% extends "base.html" %}

{% block title %}
Upload Learning Material
{% endblock %}

{% block content %}

<div class="container mt-4">

<div class="card shadow">

<div class="card-header bg-success text-white">

<h3>Upload Learning Material</h3>

</div>

<div class="card-body">

<form method="POST"
      enctype="multipart/form-data">

<div class="mb-3">

<label>Course</label>

<select
name="course_id"
class="form-select">

{% for course in courses %}

<option value="{{ course.id }}">

{{ course.code }} - {{ course.title }}

</option>

{% endfor %}

</select>

</div>

<div class="mb-3">

<label>Title</label>

<input
type="text"
name="title"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Description</label>

<textarea
name="description"
rows="5"
class="form-control"></textarea>

</div>

<div class="mb-3">

<label>Upload File</label>

<input
type="file"
name="file"
class="form-control"
required>

</div>

<button class="btn btn-success">

Upload Material

</button>

<a href="/elearning"
class="btn btn-secondary">

Cancel

</a>

</form>

</div>

</div>

</div>

{% endblock %}
