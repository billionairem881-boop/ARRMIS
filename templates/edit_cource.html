{% extends "base.html" %}

{% block title %}
Edit Course
{% endblock %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-warning">

            <h3>Edit Course</h3>

        </div>

        <div class="card-body">

            <form method="POST">

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Course Code
                        </label>

                        <input
                            type="text"
                            name="code"
                            class="form-control"
                            value="{{ course.code }}"
                            required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Course Title
                        </label>

                        <input
                            type="text"
                            name="title"
                            class="form-control"
                            value="{{ course.title }}"
                            required>

                    </div>

                    <div class="col-md-4 mb-3">

                        <label class="form-label">
                            Credit Hours
                        </label>

                        <input
                            type="number"
                            name="credit_hours"
                            class="form-control"
                            value="{{ course.credit_hours }}"
                            min="1"
                            max="6">

                    </div>

                    <div class="col-md-4 mb-3">

                        <label class="form-label">
                            Semester
                        </label>

                        <select
                            name="semester"
                            class="form-select">

                            <option
                            {% if course.semester=="Semester I" %}selected{% endif %}>
                            Semester I
                            </option>

                            <option
                            {% if course.semester=="Semester II" %}selected{% endif %}>
                            Semester II
                            </option>

                        </select>

                    </div>

                    <div class="col-md-4 mb-3">

                        <label class="form-label">
                            Level
                        </label>

                        <select
                            name="level"
                            class="form-select">

                            <option {% if course.level==100 %}selected{% endif %}>100</option>
                            <option {% if course.level==200 %}selected{% endif %}>200</option>
                            <option {% if course.level==300 %}selected{% endif %}>300</option>
                            <option {% if course.level==400 %}selected{% endif %}>400</option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Department
                        </label>

                        <input
                            type="text"
                            name="department"
                            class="form-control"
                            value="{{ course.department }}">

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Lecturer
                        </label>

                        <input
                            type="text"
                            name="lecturer"
                            class="form-control"
                            value="{{ course.lecturer }}">

                    </div>

                    <div class="col-md-12 mb-3">

                        <label class="form-label">
                            Description
                        </label>

                        <textarea
                            name="description"
                            rows="5"
                            class="form-control">{{ course.description }}</textarea>

                    </div>

                </div>

                <div class="text-center mt-4">

                    <button
                        type="submit"
                        class="btn btn-warning">

                        Update Course

                    </button>

                    <a
                        href="{{ url_for('courses') }}"
                        class="btn btn-secondary">

                        Back

                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
