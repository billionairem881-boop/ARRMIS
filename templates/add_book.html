{% extends "base.html" %}

{% block title %}Add Book{% endblock %}

{% block content %}

<div class="container mt-4">

<div class="card shadow">

<div class="card-header bg-success text-white">

<h3>Add Library Book</h3>

</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label class="form-label">

Book Title

</label>

<input
type="text"
name="title"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">

Author

</label>

<input
type="text"
name="author"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">

Category

</label>

<input
type="text"
name="category"
class="form-control">

</div>

<div class="row">

<div class="col-md-6">

<label class="form-label">

ISBN

</label>

<input
type="text"
name="isbn"
class="form-control">

</div>

<div class="col-md-6">

<label class="form-label">

Copies

</label>

<input
type="number"
name="copies"
value="1"
min="1"
class="form-control">

</div>

</div>

<br>

<div class="mb-3">

<label class="form-label">

Description

</label>

<textarea
name="description"
rows="5"
class="form-control"></textarea>

</div>

<button
type="submit"
class="btn btn-success">

Save Book

</button>

<a
href="{{ url_for('library') }}"
class="btn btn-secondary">

Cancel

</a>

</form>

</div>

</div>

</div>

{% endblock %}
