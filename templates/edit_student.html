{% extends "base.html" %}

{% block title %}Edit Student{% endblock %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-warning text-dark">
            <h3>Edit Student Details</h3>
        </div>

        <div class="card-body">

            <form method="POST">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label>Registration Number</label>
                        <input
                            type="text"
                            name="reg_no"
                            class="form-control"
                            value="{{ student.reg_no }}"
                            readonly>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Full Name</label>
                        <input
                            type="text"
                            name="full_name"
                            class="form-control"
                            value="{{ student.full_name }}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Gender</label>

                        <select name="gender" class="form-control">

                            <option {% if student.gender=="Male" %}selected{% endif %}>
                                Male
                            </option>

                            <option {% if student.gender=="Female" %}selected{% endif %}>
                                Female
                            </option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Programme</label>

                        <input
                            type="text"
                            name="programme"
                            class="form-control"
                            value="{{ student.programme }}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Department</label>

                        <input
                            type="text"
                            name="department"
                            class="form-control"
                            value="{{ student.department }}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Year</label>

                        <input
                            type="number"
                            name="year"
                            class="form-control"
                            value="{{ student.year }}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Phone</label>

                        <input
                            type="text"
                            name="phone"
                            class="form-control"
                            value="{{ student.phone }}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Parent Phone</label>

                        <input
                            type="text"
                            name="parent_phone"
                            class="form-control"
                            value="{{ student.parent_phone }}">
                    </div>

                    <div class="col-md-12 mb-3">
                        <label>Email</label>

                        <input
                            type="email"
                            name="email"
                            class="form-control"
                            value="{{ student.email }}">
                    </div>

                </div>

                <hr>

                <h4>Edit Scores</h4>

                <div class="row">

                    <div class="col-md-3 mb-3">
                        <label>Programming</label>
                        <input type="number"
                               name="programming"
                               class="form-control"
                               value="{{ student.programming }}">
                    </div>

                    <div class="col-md-3 mb-3">
                        <label>Database</label>
                        <input type="number"
                               name="database"
                               class="form-control"
                               value="{{ student.database }}">
                    </div>

                    <div class="col-md-3 mb-3">
                        <label>Networking</label>
                        <input type="number"
                               name="networking"
                               class="form-control"
                               value="{{ student.networking }}">
                    </div>

                    <div class="col-md-3 mb-3">
                        <label>Cyber Security</label>
                        <input type="number"
                               name="cyber_security"
                               class="form-control"
                               value="{{ student.cyber_security }}">
                    </div>

                    <div class="col-md-3 mb-3">
                        <label>Web Development</label>
                        <input type="number"
                               name="web_development"
                               class="form-control"
                               value="{{ student.web_development }}">
                    </div>

                    <div class="col-md-3 mb-3">
                        <label>Data Structures</label>
                        <input type="number"
                               name="data_structures"
                               class="form-control"
                               value="{{ student.data_structures }}">
                    </div>

                    <div class="col-md-3 mb-3">
                        <label>Operating Systems</label>
                        <input type="number"
                               name="operating_systems"
                               class="form-control"
                               value="{{ student.operating_systems }}">
                    </div>

                    <div class="col-md-3 mb-3">
                        <label>Artificial Intelligence</label>
                        <input type="number"
                               name="artificial_intelligence"
                               class="form-control"
                               value="{{ student.artificial_intelligence }}">
                    </div>

                </div>

                <div class="text-center mt-4">

                    <button class="btn btn-warning btn-lg">
                        Update Student
                    </button>

                    <a href="{{ url_for('dashboard') }}"
                       class="btn btn-secondary btn-lg">
                        Back
                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
