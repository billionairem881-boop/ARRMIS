{% extends "base.html" %}

{% block title %}Record Payment{% endblock %}

{% block content %}

<div class="container mt-4">

<div class="card shadow">

<div class="card-header bg-success text-white">

<h3>Record Student Payment</h3>

</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label class="form-label">

Student

</label>

<select
name="student_id"
class="form-select"
required>

{% for student in students %}

<option value="{{ student.id }}">

{{ student.reg_no }} - {{ student.full_name }}

</option>

{% endfor %}

</select>

</div>

<div class="row">

<div class="col-md-6">

<label class="form-label">

Amount

</label>

<input
type="number"
step="0.01"
name="amount"
class="form-control"
required>

</div>

<div class="col-md-6">

<label class="form-label">

Semester

</label>

<select
name="semester"
class="form-select">

<option>Semester I</option>
<option>Semester II</option>

</select>

</div>

</div>

<br>

<div class="mb-3">

<label class="form-label">

Payment Method

</label>

<select
name="payment_method"
class="form-select">

<option>Cash</option>
<option>Bank Transfer</option>
<option>Mobile Money</option>
<option>Card Payment</option>

</select>

</div>

<div class="mb-3">

<label class="form-label">

Reference Number

</label>

<input
type="text"
name="reference"
class="form-control">

</div>

<div class="text-center">

<button
type="submit"
class="btn btn-success">

Save Payment

</button>

<a
href="{{ url_for('fees') }}"
class="btn btn-secondary">

Cancel

</a>

</div>

</form>

</div>

</div>

</div>

{% endblock %}
