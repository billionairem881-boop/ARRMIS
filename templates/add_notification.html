{% extends "base.html" %}

{% block title %}Send Notification{% endblock %}

{% block content %}

<div class="container mt-4">

<div class="card shadow">

<div class="card-header bg-success text-white">

<h3>Send Notification</h3>

</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label class="form-label">

Title

</label>

<input
type="text"
name="title"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">

Message

</label>

<textarea
name="message"
rows="6"
class="form-control"
required></textarea>

</div>

<div class="mb-3">

<label class="form-label">

Recipient

</label>

<select
name="recipient"
class="form-select">

<option value="all">All Users</option>
<option value="students">Students</option>
<option value="lecturers">Lecturers</option>
<option value="administrators">Administrators</option>

</select>

</div>

<div class="text-center">

<button
type="submit"
class="btn btn-success">

Send Notification

</button>

<a
href="{{ url_for('notifications') }}"
class="btn btn-secondary">

Cancel

</a>

</div>

</form>

</div>

</div>

</div>

{% endblock %}
