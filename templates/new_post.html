{% extends "base.html" %}

{% block title %}New Discussion{% endblock %}

{% block content %}

<div class="container mt-4">

<div class="card shadow">

<div class="card-header bg-success text-white">

<h3>Create Discussion</h3>

</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label class="form-label">

Discussion Title

</label>

<input
type="text"
name="title"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">

Message

</label>

<textarea
name="content"
rows="8"
class="form-control"
required></textarea>

</div>

<div class="text-center">

<button
type="submit"
class="btn btn-success">

Post Discussion

</button>

<a
href="{{ url_for('forum') }}"
class="btn btn-secondary">

Cancel

</a>

</div>

</form>

</div>

</div>

</div>

{% endblock %}
